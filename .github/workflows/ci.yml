name: RAGOps CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:

    # Step 1: Checkout repository
    - name: Checkout Code
      uses: actions/checkout@v5

    # Step 2: Setup Python
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"

    # Step 3: Install dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-api.txt
        pip install -r requirements-dev.txt

    # Step 4: Run basic import test
    - name: Run App Test
      run: |
        python -c "import fastapi"
        python -c "import mlflow"
        python -c "import chromadb"
        python -c "import langchain"
        python -c "import streamlit"

    # Step 5: Build Docker Image
    - name: Build Docker Image
      run: |
        docker build -t ragops-ai .
    
     # =========================
      # Build Streamlit Docker Image
      # =========================

    - name: Build Streamlit Docker Image
      run: |
        docker build -f Dockerfile.streamlit -t ragops-streamlit .