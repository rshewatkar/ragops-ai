services:

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1

    container_name: mlflow-server

    ports:
      - "5000:5000"

    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000

  ragops-api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: ragops-api

    ports:
      - "8000:8000"

    environment:
      - HF_TOKEN=${HF_TOKEN}

    depends_on:
      - mlflow

  streamlit-ui:
    build:
      context: .
      dockerfile: Dockerfile.streamlit

    container_name: streamlit-ui

    ports:
      - "8501:8501"

    environment:
      - API_URL=http://ragops-api:8000

    depends_on:
      - ragops-api
